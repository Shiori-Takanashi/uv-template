name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy --ignore-missing-imports src tests

      - name: Run tests and generate reports
        # --cov の値は自身のパッケージ名に書き換えてください
        run: |
          mkdir -p .ci_cache/.pytest_reports
          uv run pytest \
            --junitxml=.ci_cache/.pytest_reports/report.xml \
            --cov=template \
            --cov-report=xml:.ci_cache/.pytest_reports/coverage.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: ".ci_cache/.pytest_reports/report.xml"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-xml
          # pytestで指定した出力先と合わせる必要があります
          path: .ci_cache/.pytest_reports/coverage.xml
          if-no-files-found: error
